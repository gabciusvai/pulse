{% extends "base.html" %}
{% set current_user_avatar = user['avatar'] %}
{% block title %}Edit Profile{% endblock %}
{% block content %}
<div class="page" style="max-width:500px;">
  <h2 style="margin-bottom:24px;">✏️ Edit Profile</h2>
  <div class="card">
    <form method="POST" enctype="multipart/form-data">
      <div style="text-align:center;margin-bottom:24px;">
        <img class="avatar avatar-xl" id="avatarPreview"
             src="{{ url_for('uploaded_file', filename= user['avatar']) }}"
             onerror="this.src='https://ui-avatars.com/api/?name={{ user['username'] }}&background=7c5cfc&color=fff'" alt="">
        <div style="margin-top:12px;">
          <label for="avatar" class="btn btn-outline btn-sm" style="cursor:pointer;">📷 Change Photo</label>
          <input type="file" id="avatar" name="avatar" accept="image/*" style="display:none;" onchange="previewAvatar(this)">
        </div>
      </div>
      <div class="field" style="margin-bottom:16px;">
        <label style="display:block;font-size:.85rem;color:var(--muted);margin-bottom:6px;">Bio</label>
        <textarea class="input" name="bio" rows="4" placeholder="Tell people about yourself...">{{ user['bio'] or '' }}</textarea>
      </div>
      <div style="display:flex;gap:10px;">
        <button type="submit" class="btn btn-primary">Save Changes</button>
        <a href="{{ url_for('profile', username=session.username) }}" class="btn btn-outline">Cancel</a>
      </div>
    </form>
  </div>
</div>
<script>
function previewAvatar(input) {
  if (input.files && input.files[0]) {
    const reader = new FileReader();
    reader.onload = e => document.getElementById('avatarPreview').src = e.target.result;
    reader.readAsDataURL(input.files[0]);
  }
}
</script>
{% endblock %}
