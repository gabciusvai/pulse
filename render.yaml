services:
  - type: web
    name: pulse
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --worker-class eventlet -w 1 app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: RENDER_EXTERNAL_URL
        fromService:
          type: web
          name: pulse
          property: host
